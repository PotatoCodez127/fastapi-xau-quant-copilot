# .github/workflows/ci.yaml
name: Quantitative Core CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11'

    - name: Install Poetry Dependency Manager
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Configure Poetry Cache Mapping
      uses: actions/cache@v4
      with:
        path: ~/.cache/pypoetry
        key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-poetry-

    - name: Install pinned project dependencies
      run: poetry install --no-interaction

    - name: Run Ruff Linter Enforcements
      run: poetry run ruff check src/ main.py config.py

    - name: Execute Automated Test Verification Frameworks
      run: |
        poetry run pytest --asyncio-mode=strict
      env:
        TWELVEDATA_API_KEY: "ci_mock_twelvedata_token"
        OLLAMA_API_KEYS: "ci_mock_ollama_token"
        OLLAMA_MODEL: "ci-test-model"
        DATABASE_PATH: "data/test_rag_db"
        LIVE_LEDGER_PATH: "data/test_live_ledger.csv"
        BACKTEST_LEDGER_PATH: "data/test_ledger.csv"